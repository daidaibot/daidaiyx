<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>呆呆网络 · 运营后台</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <div class="brand">呆呆网络</div>
      <h1>运营后台</h1>
      <input id="pwd" type="password" placeholder="管理员密码" autocomplete="current-password" />
      <button id="loginBtn" type="button">登录</button>
      <p id="loginErr" class="err"></p>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="side-brand">呆呆网络</div>
      <nav>
        <button class="nav on" data-tab="overview">总览</button>
        <button class="nav" data-tab="logs">请求日志</button>
        <button class="nav" data-tab="errors">错误日志</button>
        <button class="nav" data-tab="services">服务配置</button>
        <button class="nav" data-tab="settings">运行管控</button>
        <button class="nav" data-tab="probe">连通探测</button>
        <button class="nav" data-tab="routes">接口清单</button>
        <button class="nav" data-tab="guide">部署清单</button>
      </nav>
      <button id="logoutBtn" class="logout" type="button">退出</button>
    </aside>
    <main class="main">
      <header class="top">
        <div>
          <h2 id="pageTitle">总览</h2>
        </div>
        <div class="top-right">
          <button type="button" class="btn ghost" id="refreshBtn">刷新</button>
          <span class="badge" id="aliveBadge">检测中…</span>
        </div>
      </header>

      <section id="tab-overview" class="panel">
        <div class="cards" id="statCards"></div>
        <div class="grid-2">
          <div class="box">
            <div class="box-h">近 24 小时请求走势</div>
            <div class="bars" id="hourlyBars"></div>
          </div>
          <div class="box">
            <div class="box-h">系统信息</div>
            <div class="kv" id="sysInfo"></div>
          </div>
        </div>
        <div class="note" id="announceNote"></div>
      </section>

      <section id="tab-logs" class="panel hidden">
        <div class="toolbar">
          <button type="button" class="btn" id="reloadLogs">刷新日志</button>
          <button type="button" class="btn danger" id="clearLogs">清空日志</button>
        </div>
        <div class="table-wrap">
          <table class="table compact">
            <thead>
              <tr><th>时间</th><th>方法</th><th>路径</th><th>状态</th><th>耗时</th><th>IP</th></tr>
            </thead>
            <tbody id="logsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-errors" class="panel hidden">
        <div class="toolbar">
          <button type="button" class="btn" id="reloadErrors">刷新错误</button>
        </div>
        <div class="table-wrap">
          <table class="table compact">
            <thead>
              <tr><th>时间</th><th>来源</th><th>状态</th><th>信息</th></tr>
            </thead>
            <tbody id="errorsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-services" class="panel hidden">
        <div class="box">
          <div class="box-h">能力状态</div>
          <table class="table">
            <thead><tr><th>能力</th><th>状态</th><th>说明</th></tr></thead>
            <tbody id="svcBody"></tbody>
          </table>
        </div>
        <div class="box" style="margin-top:16px;">
          <div class="box-h">环境变量（仅显示是否配置 / 脱敏）</div>
          <div class="kv" id="envInfo"></div>
        </div>
      </section>

      <section id="tab-settings" class="panel hidden">
        <div class="box form-box">
          <div class="box-h">运行开关</div>
          <label class="switch-row"><input type="checkbox" id="setMaintenance" /> 维护模式</label>
          <label class="switch-row"><input type="checkbox" id="setBlockChat" /> 暂停对话</label>
          <label class="switch-row"><input type="checkbox" id="setBlockImage" /> 暂停生图</label>
          <label class="field">限流 / 分钟
            <input id="setRate" type="number" min="10" max="5000" />
          </label>
          <label class="field">小程序对接域名
            <input id="setApiBase" type="text" placeholder="https://你的云托管域名" />
          </label>
          <label class="field">维护提示
            <input id="setMaintMsg" type="text" maxlength="200" />
          </label>
          <label class="field">公告
            <textarea id="setAnnounce" rows="3" maxlength="500"></textarea>
          </label>
          <label class="field">备注
            <textarea id="setNotes" rows="4" maxlength="2000"></textarea>
          </label>
          <button type="button" class="btn" id="saveSettings">保存设置</button>
          <p class="muted" id="settingsTip"></p>
        </div>

        <div class="box form-box" style="margin-top:16px;">
          <div class="box-h">密钥</div>
          <label class="field">呆呆 AI
            <input id="secChat" type="password" placeholder="留空不修改" autocomplete="off" />
          </label>
          <p class="muted" id="secChatHint">未配置</p>
          <label class="field">呆呆 Image
            <input id="secImage" type="password" placeholder="留空不修改" autocomplete="off" />
          </label>
          <p class="muted" id="secImageHint">未配置</p>
          <div class="toolbar">
            <button type="button" class="btn" id="saveSecrets">保存密钥</button>
            <button type="button" class="btn danger" id="clearChatKey">清除对话密钥</button>
            <button type="button" class="btn danger" id="clearImageKey">清除生图密钥</button>
          </div>
          <p class="muted" id="secretsTip"></p>
        </div>
      </section>

      <section id="tab-probe" class="panel hidden">
        <div class="cards probe-cards">
          <div class="box">
            <div class="box-h">呆呆 AI</div>
            <button type="button" class="btn" data-probe="chat">探测</button>
            <pre class="probe-out" id="probeChat">尚未探测</pre>
          </div>
          <div class="box">
            <div class="box-h">呆呆 Image</div>
            <button type="button" class="btn" data-probe="image">探测</button>
            <pre class="probe-out" id="probeImage">尚未探测</pre>
          </div>
          <div class="box">
            <div class="box-h">小程序登录</div>
            <button type="button" class="btn" data-probe="wechat">探测</button>
            <pre class="probe-out" id="probeWechat">尚未探测</pre>
          </div>
        </div>
      </section>

      <section id="tab-routes" class="panel hidden">
        <table class="table">
          <thead><tr><th>方法</th><th>路径</th><th>说明</th></tr></thead>
          <tbody id="routesBody"></tbody>
        </table>
      </section>

      <section id="tab-guide" class="panel hidden">
        <div class="guide">
          <h3>上线清单</h3>
          <ol>
            <li><code>ADMIN_PASSWORD</code>、<code>WECHAT_APPID</code>、<code>WECHAT_SECRET</code></li>
            <li>后台填写呆呆 AI / 呆呆 Image 密钥与对接域名</li>
            <li>小程序 <code>apiBase</code> 与合法域名</li>
          </ol>
        </div>
      </section>
    </main>
  </div>
  <script src="./admin.js"></script>
</body>
</html>
