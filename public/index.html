<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>呆呆接星 · 呆呆网络</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="shell">
    <header class="brand">
      <div class="logo">呆呆网络</div>
      <div class="sub">DAIDAI · 接星小游戏</div>
    </header>

    <div class="hud">
      <span>得分 <strong id="score">0</strong></span>
      <span>最高 <strong id="best">0</strong></span>
      <span>生命 <strong id="lives">3</strong></span>
    </div>

    <canvas id="game" width="360" height="540"></canvas>

    <div class="hint">← → / A D 移动 · 触屏左右滑动 · 空格重开</div>

    <div id="overlay" class="overlay">
      <div class="panel">
        <h1 id="title">呆呆接星</h1>
        <p id="desc">接住金色星星加分，躲开红色陨石。</p>
        <button id="startBtn" type="button">开始游戏</button>
      </div>
    </div>
  </div>
  <script src="/game.js"></script>
</body>
</html>
